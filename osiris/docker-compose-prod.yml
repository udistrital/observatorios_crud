version: '3.8'

services:
  web:
    tty: true
    build: .
    container_name: web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

    depends_on:
      - elasticsearch
    
    networks:
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true  # Deshabilita la seguridad (solo para desarrollo)
      - xpack.security.transport.ssl.enabled=false
      - xpack.security.http.ssl.enabled=false
    ports:
      - "9200:9200"  # Puerto para acceder a Elasticsearch
      - "9300:9300"  # Puerto para transporte interno
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - backend

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"  # Puerto para acceder a Kibana
    depends_on:
      - elasticsearch  # Asegura que Elasticsearch se inicie antes que Kibana

    networks:
      - backend

  observatorio-server:
    image: nginx:latest
    container_name: observatorio-server
    restart: always
    depends_on:
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"
    networks:
      - backend

volumes:
  es_data:
    driver: local

networks:
  backend:
    driver: bridge
