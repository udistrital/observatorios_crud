kind: pipeline
name: oati_cliente_ci

steps:
  - name: run_sonar_scanner
    image: sonarsource/sonar-scanner-cli:latest
    environment:
      SONAR_HOST_URL:
        from_secret: SONAR_HOST
      SONAR_TOKEN:
        from_secret: SONAR_TOKEN
      SONAR_SCANNER_OPTS: "-Dsonar.working.directory=/tmp/.scannerwork"
    commands:
      - sonar-scanner
    when:
      branch:
        - develop
        - feature/*
        - release/*
      event:
        - push

  - name: publish_to_ecr_release
    image: plugins/ecr
    settings:
      access_key:
        from_secret: AWS_ACCESS_KEY_ID
      create_repository: true
      dockerfile: osiris/Dockerfile
      region:
        from_secret: AWS_REGION
      repo: ${DRONE_REPO_NAME}
      secret_key:
        from_secret: AWS_SECRET_ACCESS_KEY
      tags:
        - ${DRONE_COMMIT:0:7}
        - release
    when:
      branch:
        - release/*
      event:
        - push

  - name: publish_to_ecr_prod_elastic
    image: docker:25.0.0-dind
    privileged: true
    environment:
      DOCKER_HOST: tcp://docker:2375
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - name: dockersock
        path: /var/run
    commands:
      - apk add --no-cache docker-cli docker-compose
      - cd infraestructura
      - docker-compose -f docker-compose-prod.yml up -d --build
    when:
      branch:
        - release/*
      event:
        - push

  - name: publish_to_ecr_prod
    image: plugins/ecr
    settings:
      access_key:
        from_secret: AWS_ACCESS_KEY_ID
      create_repository: true
      region:
        from_secret: AWS_REGION
      repo: ${DRONE_REPO_NAME}
      secret_key:
        from_secret: AWS_SECRET_ACCESS_KEY
      tags:
        - ${DRONE_COMMIT:0:7}
        - latest
    when:
      branch:
        - master
      event:
        - push