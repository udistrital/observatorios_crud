kind: pipeline
name: oati_cliente_ci

steps:
  - name: run_sonar_scanner
    image: sonarsource/sonar-scanner-cli:latest
    environment:
      SONAR_HOST_URL:
        from_secret: SONAR_HOST
      SONAR_TOKEN:
        from_secret: SONAR_TOKEN
      SONAR_SCANNER_OPTS: "-Dsonar.working.directory=/tmp/.scannerwork"
    commands:
      - sonar-scanner
    when:
      branch:
        - develop
        - feature/*
        - release/*
      event:
        - push

  - name: publish_to_ecr_release
    image: plugins/ecr
    settings:
      access_key:
        from_secret: AWS_ACCESS_KEY_ID
      create_repository: true
      dockerfile: osiris/Dockerfile
      context: osiris
      region:
        from_secret: AWS_REGION
      repo: ${DRONE_REPO_NAME}
      secret_key:
        from_secret: AWS_SECRET_ACCESS_KEY
      tags:
        - ${DRONE_COMMIT:0:7}
        - release
    when:
      branch:
        - release/*
      event:
        - push

  - name: update_aws_ecs
    image: golang:1.18
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY:
        from_secret: AWS_SECRET_ACCESS_KEY
      AWS_CONTAINER:
        from_secret: AWS_CONTAINER
    commands:
      - case ${DRONE_BRANCH} in
          release/*)
            AMBIENTE=test
            CLUSTER=test
            MYCONTAINER=$${AWS_CONTAINER}/${DRONE_REPO##udistrital/}:release
            ;;
          master)
            AMBIENTE=prod
            CLUSTER=oas
            MYCONTAINER=$${AWS_CONTAINER}/${DRONE_REPO##udistrital/}:latest
            ;;
        esac
      - AWS_REGION=us-east-1
      - SERVICE=${DRONE_REPO##udistrital/}_$AMBIENTE
      - apt-get update
      - apt-get install unzip
      - wget https://github.com/Autodesk/go-awsecs/releases/download/v1.1/update-aws-ecs-service-linux-amd64.zip
      - unzip update-aws-ecs-service-linux-amd64.zip -d /go/bin
      - AWS_ACCESS_KEY_ID=$${AWS_ACCESS_KEY_ID} AWS_SECRET_ACCESS_KEY=$${AWS_SECRET_ACCESS_KEY} AWS_REGION=$AWS_REGION
        $GOPATH/bin/update-aws-ecs-service -cluster $CLUSTER -service $SERVICE -container-image $MYCONTAINER
    when:
      branch:
        - release/*
        #- master
      event:
        - push

  - name: publish_elasticsearch
    image: plugins/ecr
    settings:
      access_key:
        from_secret: AWS_ACCESS_KEY_ID
      create_repository: true
      region:
        from_secret: AWS_REGION
      repo: elasticsearch-service
      dockerfile: infraestructura/elasticsearch/Dockerfile
      secret_key:
        from_secret: AWS_SECRET_ACCESS_KEY
      tags:
        - latest
    when:
      branch:
        #- release/*
        - master
      event:
        - push

  - name: publish_kibana
    image: plugins/ecr
    settings:
      access_key:
        from_secret: AWS_ACCESS_KEY_ID
      create_repository: true
      region:
        from_secret: AWS_REGION
      repo: kibana-service
      dockerfile: infraestructura/kibana/Dockerfile
      secret_key:
        from_secret: AWS_SECRET_ACCESS_KEY
      tags:
        - latest
    when:
      branch:
        #- release/*
        - master
      event:
        - push

  - name: publish_nginx
    image: plugins/ecr
    settings:
      access_key:
        from_secret: AWS_ACCESS_KEY_ID
      create_repository: true
      region:
        from_secret: AWS_REGION
      repo: nginx-elastic
      dockerfile: infraestructura/nginx/Dockerfile
      secret_key:
        from_secret: AWS_SECRET_ACCESS_KEY
      tags:
        - latest
    when:
      branch:
        #- release/*
        - master
      event:
        - push

  - name: publish_to_ecr_prod
    image: plugins/ecr
    settings:
      access_key:
        from_secret: AWS_ACCESS_KEY_ID
      create_repository: true
      region:
        from_secret: AWS_REGION
      repo: ${DRONE_REPO_NAME}
      secret_key:
        from_secret: AWS_SECRET_ACCESS_KEY
      tags:
        - ${DRONE_COMMIT:0:7}
        - latest
    when:
      branch:
        - master
      event:
        - push